<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }

      .box {
        background-color: rgb(66, 172, 172);
        width: 100px;
        height: 100px;
        font-size: 16px;
        color: #fff;
        font-weight: 800;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .container {
        height: 200px;
        border: 1px solid #000;
        display: flex;
        margin-top: 10px;
      }

      .container-1 {
        justify-content: space-between;
        align-items: center;
      }

      .container-2 {
        align-items: center;
        justify-content: space-between;
        flex-direction: row-reverse;
      }

      .container-3 {
        flex-direction: column;
        align-items: center;
        .box-2 {
          margin-top: 10px;
          margin-bottom: 40px;
        }
      }

      .container-4 {
        justify-content: center;
        align-items: center;
        .box-2 {
            margin-left: 10px;
            margin-right: 40px;
        }
      }

      .container-5 {
        flex-direction: column-reverse;
        justify-content: center;
        align-items: center;
      }

      .container-6 {
        align-items: flex-start;
        justify-content: space-between;
      }

      .container-7 {
        flex-direction: column;
        align-items: center;
        .box-2 {
            margin-top: 60px;
            margin-bottom: 20px;
        }
      }

      .container-8 {
        align-items: center;
        .box-2 {
            margin: auto;
        }
      }

      .container-9 {
        justify-content: center;
        align-items: center;
        gap: 20px;
        .box-1 {
            margin-top: -40px;
        }
        .box-3 {
            margin-bottom: -40px;
        }
      }

      .container-10 {
        align-items: center;
        justify-content: center;
        .box-1 {
            margin-bottom: auto;
        }
        .box-2 {
            margin: auto;
        }
        .box-3 {
            margin-top: auto;
        }
      }
    </style>
  </head>
  <body>
    <!-- Container 1 -->
    <div class="container container-1">
      <div class="box box-1">1</div>
      <div class="box box-2">2</div>
      <div class="box box-3">3</div>
    </div>

    <!-- Container 2 -->
    <div class="container container-2">
